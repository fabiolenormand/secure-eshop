<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure E-Shop</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:#333}
    header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.3)}
    header h1{font-size:1.6rem;letter-spacing:1px}
    header a{color:#e94560;text-decoration:none;font-size:.9rem}
    .cart-btn{background:#e94560;color:white;border:none;padding:10px 20px;border-radius:25px;cursor:pointer;font-size:.95rem}
    .cart-count{background:white;color:#e94560;border-radius:50%;padding:1px 7px;font-weight:bold;margin-left:8px}
    main{max-width:1200px;margin:0 auto;padding:32px 16px}
    h2{margin-bottom:24px;font-size:1.4rem;color:#1a1a2e}
    .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}
    .product-card{background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:transform .2s,box-shadow .2s}
    .product-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
    .product-card img{width:100%;height:150px;object-fit:cover}
    .product-info{padding:16px}
    .product-info h3{font-size:1rem;margin-bottom:6px}
    .category{font-size:.78rem;color:#888;margin-bottom:8px}
    .desc{font-size:.85rem;color:#666;margin-bottom:12px}
    .product-footer{display:flex;justify-content:space-between;align-items:center}
    .price{font-size:1.2rem;font-weight:bold;color:#e94560}
    .stock{font-size:.78rem;color:#888}
    .add-btn{background:#1a1a2e;color:white;border:none;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:.85rem;transition:background .2s}
    .add-btn:hover{background:#e94560}
    .cart-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100}
    .cart-overlay.open{display:block}
    .cart-sidebar{position:fixed;right:0;top:0;bottom:0;width:380px;background:white;z-index:101;padding:24px;overflow-y:auto;box-shadow:-4px 0 20px rgba(0,0,0,.2);transform:translateX(100%);transition:transform .3s}
    .cart-sidebar.open{transform:translateX(0)}
    .cart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    .close-btn{background:none;border:none;font-size:1.5rem;cursor:pointer}
    .cart-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #eee}
    .cart-item-name{font-size:.9rem;font-weight:600}
    .cart-item-sub{font-size:.8rem;color:#888}
    .cart-item-price{font-weight:bold;color:#e94560}
    .remove-btn{background:none;border:none;color:#e94560;cursor:pointer;font-size:1.1rem}
    .cart-total{margin-top:20px;font-size:1.1rem;font-weight:bold;text-align:right}
    .order-form{margin-top:24px}
    .order-form h3{margin-bottom:12px}
    .order-form input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;margin-bottom:10px;font-size:.9rem}
    .order-btn{width:100%;padding:14px;background:#e94560;color:white;border:none;border-radius:10px;font-size:1rem;cursor:pointer;font-weight:bold}
    .empty-cart{text-align:center;color:#888;margin-top:40px}
    .msg{padding:12px 16px;border-radius:8px;margin-top:10px;display:none}
    .msg.success{background:#d4edda;color:#155724;display:block}
    .msg.error{background:#f8d7da;color:#721c24;display:block}
    footer{text-align:center;padding:24px;color:#888;font-size:.85rem}
  </style>
</head>
<body>
  <header>
    <h1>Secure E-Shop</h1>
    <div style="display:flex;gap:16px;align-items:center">
      <a href="/admin.html">Admin</a>
      <button class="cart-btn" onclick="toggleCart()">Cart <span class="cart-count" id="cartCount">0</span></button>
    </div>
  </header>
  <main>
    <h2>Our Products</h2>
    <div class="products-grid" id="productsGrid"><p style="color:#888">Loading products...</p></div>
  </main>
  <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
  <div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button class="close-btn" onclick="toggleCart()">X</button>
    </div>
    <div id="cartItems"><p class="empty-cart">Your cart is empty.</p></div>
    <div class="cart-total" id="cartTotal"></div>
    <div class="order-form" id="orderForm" style="display:none">
      <h3>Complete your order</h3>
      <input type="text" id="custName" placeholder="Full Name" required />
      <input type="email" id="custEmail" placeholder="Email Address" required />
      <button class="order-btn" onclick="placeOrder()">Place Order</button>
      <div class="msg" id="orderMsg"></div>
    </div>
  </div>
  <footer>&copy; 2024 Secure E-Shop - Lab 7</footer>
  <script src="app.js"></script>
</body>
</html>
