<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - Secure E-Shop</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:#333}
    header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
    header h1{font-size:1.4rem}
    .logout-btn{background:#e94560;color:white;border:none;padding:8px 18px;border-radius:20px;cursor:pointer}
    .login-screen{max-width:400px;margin:80px auto;background:white;padding:40px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
    .login-screen h2{margin-bottom:24px;text-align:center;color:#1a1a2e}
    .login-screen input{width:100%;padding:12px 16px;border:1px solid #ddd;border-radius:8px;margin-bottom:14px;font-size:.95rem}
    .login-screen button{width:100%;padding:14px;background:#e94560;color:white;border:none;border-radius:10px;font-size:1rem;cursor:pointer;font-weight:bold}
    .login-error{color:#e94560;text-align:center;margin-top:10px;font-size:.9rem}
    #adminPanel{display:none}
    .admin-layout{display:flex;min-height:calc(100vh - 60px)}
    .sidebar{width:220px;background:#1a1a2e;color:white;padding:24px 0;flex-shrink:0}
    .sidebar a{display:block;padding:12px 24px;color:#ccc;text-decoration:none;font-size:.95rem;transition:.2s}
    .sidebar a:hover,.sidebar a.active{color:white;background:#e94560}
    .content{flex:1;padding:32px;overflow-y:auto}
    .tab{display:none}.tab.active{display:block}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:28px}
    .stat-card{background:white;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.07);text-align:center}
    .stat-card .num{font-size:2rem;font-weight:bold;color:#e94560}
    .stat-card .lbl{font-size:.85rem;color:#888;margin-top:4px}
    .table-wrap{background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07)}
    table{width:100%;border-collapse:collapse}
    th{background:#1a1a2e;color:white;padding:12px 16px;text-align:left;font-size:.85rem}
    td{padding:12px 16px;border-bottom:1px solid #f0f0f0;font-size:.9rem;vertical-align:middle}
    tr:hover td{background:#fafafa}
    .btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:.83rem}
    .btn-edit{background:#17a2b8;color:white}
    .btn-del{background:#e94560;color:white}
    .btn-primary{background:#1a1a2e;color:white;padding:10px 22px;border-radius:8px;font-size:.95rem}
    .form-card{background:white;border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:24px;max-width:600px}
    .form-card h3{margin-bottom:16px;color:#1a1a2e}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .form-grid .full{grid-column:1/-1}
    label{font-size:.83rem;color:#555;display:block;margin-bottom:4px}
    input,select,textarea{width:100%;padding:9px 13px;border:1px solid #ddd;border-radius:7px;font-size:.9rem}
    textarea{resize:vertical;min-height:70px}
    .msg{padding:10px 14px;border-radius:8px;margin-top:12px}
    .msg.ok{background:#d4edda;color:#155724}
    .msg.err{background:#f8d7da;color:#721c24}
    .chart-container{background:white;border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:24px}
    canvas{max-height:300px}
    .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .section-header h2{font-size:1.2rem;color:#1a1a2e}
    .btn-export{background:#28a745;color:white;padding:9px 20px;border-radius:8px;font-size:.9rem;border:none;cursor:pointer}
  </style>
</head>
<body>
  <div id="loginScreen">
    <header><h1>Admin Login</h1></header>
    <div class="login-screen">
      <h2>Admin Panel</h2>
      <input type="text" id="loginUser" placeholder="Username" />
      <input type="password" id="loginPass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()" />
      <button onclick="doLogin()">Login</button>
      <p class="login-error" id="loginErr"></p>
    </div>
  </div>
  <div id="adminPanel">
    <header>
      <h1>Admin Panel - Secure E-Shop</h1>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </header>
    <div class="admin-layout">
      <nav class="sidebar">
        <a href="#" class="active" onclick="showTab('dashboard',this)">Dashboard</a>
        <a href="#" onclick="showTab('products',this)">Products</a>
        <a href="#" onclick="showTab('addProduct',this)">Add Product</a>
        <a href="#" onclick="showTab('orders',this)">Orders</a>
        <a href="/" style="margin-top:20px;color:#aaa">Back to Shop</a>
      </nav>
      <div class="content">
        <div class="tab active" id="tab-dashboard">
          <h2 style="margin-bottom:20px">Dashboard</h2>
          <div class="stats-grid">
            <div class="stat-card"><div class="num" id="statProducts">-</div><div class="lbl">Products</div></div>
            <div class="stat-card"><div class="num" id="statOrders">-</div><div class="lbl">Orders</div></div>
            <div class="stat-card"><div class="num" id="statRevenue">-</div><div class="lbl">Revenue ($)</div></div>
            <div class="stat-card"><div class="num" id="statPending">-</div><div class="lbl">Pending</div></div>
          </div>
          <div class="chart-container">
            <h3 style="margin-bottom:16px">Orders by Status</h3>
            <canvas id="ordersChart"></canvas>
          </div>
        </div>
        <div class="tab" id="tab-products">
          <div class="section-header"><h2>Products</h2><button class="btn-export" onclick="exportCSV('products')">Export CSV</button></div>
          <div class="table-wrap"><table><thead><tr><th>ID</th><th>Name</th><th>Price</th><th>Category</th><th>Stock</th><th>Actions</th></tr></thead><tbody id="productsTable"></tbody></table></div>
        </div>
        <div class="tab" id="tab-addProduct">
          <h2 style="margin-bottom:20px" id="productFormTitle">Add Product</h2>
          <div class="form-card">
            <div class="form-grid">
              <div><label>Name *</label><input id="pName" placeholder="Product name" /></div>
              <div><label>Price ($) *</label><input id="pPrice" type="number" step="0.01" placeholder="0.00" /></div>
              <div><label>Category</label><input id="pCategory" placeholder="Electronics" /></div>
              <div><label>Stock</label><input id="pStock" type="number" placeholder="0" /></div>
              <div class="full"><label>Description</label><textarea id="pDesc" placeholder="Product description..."></textarea></div>
              <div class="full"><label>Image URL</label><input id="pImage" placeholder="https://..." /></div>
            </div>
            <input type="hidden" id="editProductId" />
            <button class="btn btn-primary" style="margin-top:16px" onclick="saveProduct()">Save Product</button>
            <div class="msg" id="productMsg" style="display:none"></div>
          </div>
        </div>
        <div class="tab" id="tab-orders">
          <div class="section-header"><h2>Orders</h2><button class="btn-export" onclick="exportCSV('orders')">Export CSV</button></div>
          <div class="table-wrap"><table><thead><tr><th>ID</th><th>Customer</th><th>Email</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody id="ordersTable"></tbody></table></div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="admin.js"></script>
</body>
</html>
